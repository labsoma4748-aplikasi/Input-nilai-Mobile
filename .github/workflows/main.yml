name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Langkah "chmod +x gradlew" SAYA HAPUS di sini

    - name: Build with Gradle (Debug APK)
      # Menggunakan perintah 'gradle' bawaan server, BUKAN './gradlew'
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: aplikasi-debug-apk
        path: app/build/outputs/apk/debug/*.apk
